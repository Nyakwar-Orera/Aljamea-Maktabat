<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Maktabat al-Jamea</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8fafc;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Inter', sans-serif;
    }
    .offline-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.3);
      max-width: 450px;
    }
    .icon-box {
      font-size: 4rem;
      margin-bottom: 2rem;
      color: #8b4513;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon-box">📶</div>
    <h2 class="fw-bold mb-3">You're Offline</h2>
    <p class="text-muted mb-4">It seems you've lost your connection. The Library Portal requires an active connection to fetch real-time analytics.</p>
    <button onclick="window.location.reload()" class="btn btn-primary w-100 py-2 fw-semibold">Try Again</button>
  </div>
</body>
</html>
