{% extends "base.html" %}
{% block title %}404 - Page Not Found | Maktabat al-Jamea{% endblock %}
{% block content %}
<div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center p-5 rounded-4 shadow-sm bg-white border border-light-subtle" style="max-width: 500px;">
        <div class="display-1 fw-bold text-primary mb-3">404</div>
        <h2 class="fw-bold text-dark mb-4">Oops! Page not found.</h2>
        <p class="text-muted mb-5">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="{{ url_for('auth_bp.login') }}" class="btn btn-primary px-4 py-2 fw-semibold rounded-pill shadow-sm">
            <i class="bi bi-house-door me-2"></i>Return Home
        </a>
    </div>
</div>
{% endblock %}
