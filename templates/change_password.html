{% extends "base.html" %}

{% block title %}Change Password - Maktabat al-Jamea{% endblock %}

{% block extra_css %}
<style>
    .password-card {
        background: var(--bg-glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-soft);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        margin-top: 2rem;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
    }

    .form-label {
        font-weight: 600;
        color: #555;
        font-size: 0.9rem;
    }

    .form-control {
        border-radius: 10px;
        border: 1px solid var(--border-soft);
        padding: 0.75rem 1rem;
    }

    .btn-update {
        background: var(--primary-accent);
        color: #fff;
        padding: 0.75rem;
        border-radius: 10px;
        font-weight: 700;
        border: none;
        width: 100%;
        margin-top: 1rem;
        transition: all 0.3s ease;
    }

    .btn-update:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(164, 90, 38, 0.2);
    }

    .password-hint {
        font-size: 0.8rem;
        color: #777;
        margin-top: 0.5rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="password-card fade-in-up">
        <div class="card-body p-4 p-md-5">
            <h2 class="mb-4 fw-bold text-center"><i class="bi bi-key me-2 text-warning"></i>Change Password</h2>
            
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                
                <div class="mb-4">
                    <label for="old_password" class="form-label">Current Password</label>
                    <input type="password" id="old_password" name="old_password" class="form-control" required 
                           placeholder="Enter your current password">
                </div>
                
                <div class="mb-4">
                    <label for="new_password" class="form-label">New Password</label>
                    <input type="password" id="new_password" name="new_password" class="form-control" required
                           placeholder="Enter new password">
                    <div class="password-hint">
                        <i class="bi bi-info-circle me-1"></i> Use at least 8 characters with numbers and symbols.
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="confirm_password" class="form-label">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required
                           placeholder="Re-type new password">
                </div>
                
                <button type="submit" class="btn btn-update">Update Password</button>
                
                <div class="text-center mt-4">
                    <a href="{{ url_for('profile_bp.view_profile') }}" class="text-decoration-none text-muted">
                        <i class="bi bi-arrow-left me-1"></i>Back to Profile
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
